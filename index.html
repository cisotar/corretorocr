<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leitor de Gabarito</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 10px;
      background: #f5f5f5;
    }

    textarea {
      width: 90%;
      height: 120px;
      font-size: 16px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      font-size: 14px;
    }

    #preview, canvas {
      width: 100%;
      max-width: 400px;
      margin-top: 10px;
      border: 2px solid #ccc;
    }

    canvas {
      border-color: green;
    }

    #status {
      white-space: pre-line;
      font-weight: bold;
      margin-top: 10px;
    }

    .materia {
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<h2>📸 Leitor de Gabarito</h2>

<h3>Gabarito (uma letra por linha)</h3>
<textarea id="gabarito"></textarea>

<h3>Matérias</h3>
<div id="materias"></div>
<button onclick="addMateria()">+ Adicionar Matéria</button>

<h3>Capturar imagem</h3>
<input type="file" accept="image/*" capture="environment" id="camera">

<img id="preview">
<canvas id="canvas"></canvas>

<br>
<button onclick="processar()">Processar</button>

<div id="status"></div>

<script src="https://docs.opencv.org/4.x/opencv.js"></script>
<script src="app.js"></script>

</body>
</html>
